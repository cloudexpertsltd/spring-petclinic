name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Build the JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # Step 4: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Build Docker image with SHA and latest tags
      - name: Build Docker image
        run: |
          docker build -t cloudexperts/spring-petclinic:${{ github.sha }} .
          docker tag cloudexperts/spring-petclinic:${{ github.sha }} cloudexperts/spring-petclinic:latest

      - name: Push Docker images
        run: |
          docker push cloudexperts/spring-petclinic:${{ github.sha }}
          docker push cloudexperts/spring-petclinic:latest

      - name: Update GitOps repo
        run: |
          git clone https://$GITOPS_TOKEN@github.com/cloudexpertsltd/spring-petclinic-gitops.git
          cd spring-petclinic-gitops

          # Update deployment image
          sed -i "s|image: .*|image: cloudexperts/spring-petclinic:${{ github.sha }}|" deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}