name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Build the JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # Step 4: Modify Dockerfile dynamically
      - name: Prepare Dockerfile
        run: |
          # Replace placeholder with actual JAR built by Maven
          JAR_NAME=$(ls target/*.jar.original)
          echo "Using JAR: $JAR_NAME"
          sed "s|{{JAR_FILE}}|$JAR_NAME|" Dockerfile.template > Dockerfile

      # Step 5: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Build Docker image with SHA and latest tags
      - name: Build Docker image
        run: |
          docker build -t my-dockerhub-username/spring-petclinic:${{ github.sha }} .
          docker tag my-dockerhub-username/spring-petclinic:${{ github.sha }} my-dockerhub-username/spring-petclinic:latest

      - name: Push Docker images
        run: |
          docker push my-dockerhub-username/spring-petclinic:${{ github.sha }}
          docker push my-dockerhub-username/spring-petclinic:latest